<script>
  (function() {
    const CONSENT_KEY = 'siboney_analytics_consent';
    const GA_ID = 'GTM-MHCBGZS';

    function loadGA() {
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=' + GA_ID;
      document.head.appendChild(s);
      window.dataLayer = window.dataLayer || [];
      function gtag(){ window.dataLayer.push(arguments); }
      window.gtag = gtag;
      gtag('js', new Date());
      gtag('config', GA_ID, { anonymize_ip: true });
    }

    function hideBanner() {
      var banner = document.getElementById('cookie-banner');
      if (!banner) return;
      banner.style.transition = 'transform 0.35s ease, opacity 0.35s ease';
      banner.style.transform = 'translateX(-50%) translateY(160%)';
      banner.style.opacity = '0';
      setTimeout(function() {
        if (banner.parentNode) banner.parentNode.removeChild(banner);
      }, 380);
    }

    var acceptBtn = document.getElementById('consent-accept');
    var declineBtn = document.getElementById('consent-decline');

    if (acceptBtn) {
      acceptBtn.addEventListener('click', function() {
        localStorage.setItem(CONSENT_KEY, 'accepted');
        loadGA();
        hideBanner();
      });
    }

    if (declineBtn) {
      declineBtn.addEventListener('click', function() {
        localStorage.setItem(CONSENT_KEY, 'declined');
        hideBanner();
      });
    }

    // If user already chose, act immediately
    var saved = localStorage.getItem(CONSENT_KEY);
    if (saved === 'accepted') {
      loadGA();
      hideBanner();
    } else if (saved === 'declined') {
      hideBanner();
    }
  })();
</script>
